version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: njcanna
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app

  worker:
    build:
      context: ../backend
    command: celery -A tasks.scrape worker -l info -c 4
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app

  beat:
    build:
      context: ../backend
    command: celery -A tasks.scrape beat -l info
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app

volumes:
  pgdata:
